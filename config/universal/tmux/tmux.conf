#--------------------------------------------------------------------------
# Core Settings
#--------------------------------------------------------------------------

set -g default-terminal 'tmux-256color'
set-option -sa terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -ag terminal-features "*:hyperlinks"

set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g mouse on
set -g focus-events on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -s escape-time 0
setw -g mode-keys vi

set -g status-interval 10
set -g set-titles on
setw -g monitor-activity on
set -g bell-action any
set -g visual-bell off
set -g visual-activity off

#--------------------------------------------------------------------------
# Appearance
#--------------------------------------------------------------------------

set-option -g status-left-length 100
set-option -g status-right-length 100

set-option -g status-left " #{session_name}  "
set-option -g status-right "#{pane_title} "

set-option -g status-style "fg=#545c7e bg=default"
set-option -g window-status-format "#{window_index}󰿟#{pane_current_command} "
set-option -g window-status-current-format "#[fg=#545c7e]#{window_index}󰿟#[fg=#E9E9EA]#{pane_current_command} "

set-option -g window-status-current-style "fg=#E9E9EA"
set-option -g window-status-activity-style none

set-option -g pane-active-border-style "fg=#1f2335"
set-option -g pane-border-style "fg=#1f2335"

#--------------------------------------------------------------------------
# Keybinds: Prefix & Reload
#--------------------------------------------------------------------------

set -g prefix `
bind ` send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'Config reloaded'

#--------------------------------------------------------------------------
# Keybinds: Pane Navigation
#--------------------------------------------------------------------------

# Prefix-based pane movement (repeatable)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Alt-based pane movement (no prefix, Vim-aware)
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"

#--------------------------------------------------------------------------
# Keybinds: Window Navigation
#--------------------------------------------------------------------------

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind -r n next-window
bind -r p previous-window
bind C-p previous-window
bind C-n next-window

bind-key > swap-window -t +1 \; next
bind-key < swap-window -t -1 \; prev
bind -r N run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) + 1)"
bind -r P run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) - 1)"

bind Space last-window

#--------------------------------------------------------------------------
# Keybinds: Session Management
#--------------------------------------------------------------------------

bind ^ switch-client -l
bind-key s run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh switch"
bind X confirm-before -p "kill-session #S? (y/n)" kill-session

#--------------------------------------------------------------------------
# Keybinds: Panes & Windows
#--------------------------------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

#--------------------------------------------------------------------------
# Keybinds: Clipboard
#--------------------------------------------------------------------------

if-shell -b '[ "$(echo "$TMUX_VERSION >= 2.4" | bc)" = 1 ]' \
    'bind-key -T copy-mode-vi v send-keys -X begin-selection;'

bind y run -b "tmux show-buffer | wl-copy -selection clipboard"\; display-message "Copied tmux buffer to system clipboard"

#--------------------------------------------------------------------------
# Keybinds: Workflow
#--------------------------------------------------------------------------

bind-key -r F new-window t
bind-key -r D run-shell "t ~/Code/jessarcher/dotfiles"
bind-key Tab run-shell '~/Code/dotfiles/bin/tmux-popup'

#--------------------------------------------------------------------------
# Plugins
#--------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforshte/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

#--------------------------------------------------------------------------
# Plugin Settings
#--------------------------------------------------------------------------

set -g @tmux-which-key-prefix-key '/'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

